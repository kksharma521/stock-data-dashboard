services:
  mysql:
    image: mysql:8.0
    container_name: jarnox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: stock_dashboard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./app
    container_name: jarnox-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:password@mysql/stock_dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import http.client; conn=http.client.HTTPConnection('127.0.0.1',8000,timeout=5); conn.request('GET','/docs'); resp=conn.getresponse(); exit(0 if resp.status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ./frontend
    container_name: jarnox-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data: